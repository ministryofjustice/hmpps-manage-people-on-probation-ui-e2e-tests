name: Playwright Tag Test

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Select test tag to run"
        type: choice
        required: true
        options:
          - "@sequential"
          - "@reschedule"
          - "@past"
      test_path:
        description: "Optional path to a specific test file"
        required: false
        type: string

jobs:
  test-single:
    timeout-minutes: 60
    runs-on: moj-cloud-platform

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install

      - name: Remove Stale Features-gen files
        run: rm -rf .features-gen

      - name: Run selected Playwright test
        id: tests
        shell: bash
        env:
          INPUT_TEST: ${{ inputs.test }}
          INPUT_TEST_PATH: ${{ inputs.test_path }}

          # Fallback values for push runs from your branch
          PUSH_TEST: "@sequential"
          PUSH_TEST_PATH: ""

          TZ: Europe/London
          ENV: test

          # URLs
          DELIUS_URL: https://ndelius.test.probation.service.justice.gov.uk
          MANAGE_PEOPLE_ON_PROBATION_URL: https://manage-people-on-probation-dev.hmpps.service.justice.gov.uk
          MAS_API_URL: https://manage-supervision-and-delius-dev.hmpps.service.justice.gov.uk
          E_SUPERVISION_API_URL: https://esupervision-api-dev.hmpps.service.justice.gov.uk
          SIGN_IN_URL: https://sign-in-dev.hmpps.service.justice.gov.uk
          OUTLOOK_API_URL: https://probation-supervision-appointments-api-dev.hmpps.service.justice.gov.uk
          REMINDERS_UI_URL: https://probation-supervision-reminders-ui-dev.hmpps.service.justice.gov.uk

          # Credentials
          DELIUS_USERNAME: ${{ secrets.E2E_DELIUS_USERNAME }}
          DELIUS_PASSWORD: ${{ secrets.E2E_DELIUS_PASSWORD }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
        run: |
          npx bddgen

          TEST_VALUE="$INPUT_TEST"
          TEST_PATH_VALUE="$INPUT_TEST_PATH"

          if [ "${{ github.event_name }}" = "push" ]; then
            TEST_VALUE="$PUSH_TEST"
            TEST_PATH_VALUE="$PUSH_TEST_PATH"
          fi

          CMD="npx playwright test -g \"$TEST_VALUE\" --workers=1 --retries=0"

          if [ -n "$TEST_PATH_VALUE" ]; then
            CMD="$CMD \"$TEST_PATH_VALUE\""
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        id: junit
        with:
          check_name: Single test results
          report_paths: junit.xml

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-single-test-videos
          path: ./videos/
          retention-days: 7

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "*Playwright single test:* `${{ job.status }}` — `${{ github.repository }}` on `${{ github.ref_name }}`\n• Test: `${{ github.event_name == 'workflow_dispatch' && inputs.test || 'branch push default (@sequential)' }}`\n• Test path: `${{ github.event_name == 'workflow_dispatch' && inputs.test_path || 'not provided' }}`\n\n• Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }